<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luke & Hayes</title>
  <style>
    :root {
      --bg-color: #f3efff;
      --card-bg: rgba(255, 255, 255, 0.85); /* Increased transparency */
      --accent-purple: #9d8df1;
      --text-main: #4a3f6b;
      --text-muted: #7c73a3;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-color);
      font-family: "Times New Roman", Times, serif;
      color: var(--text-main);
      overflow: hidden;
    }

    /* Floating flower decorations */
    .flower {
      position: absolute;
      bottom: -10%;
      color: white;
      font-size: 2rem;
      user-select: none;
      z-index: 1;
      animation: drift 12s linear infinite;
      text-shadow: 0 0 10px rgba(157, 141, 241, 0.3);
    }

    @keyframes drift {
      from { transform: translateY(0) rotate(0deg); opacity: 0.8; }
      to { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
    }

    .card {
      position: relative;
      z-index: 10;
      max-width: 500px; /* Narrower for more background space */
      width: 80%;
      padding: 2rem 1.5rem; /* More compact padding */
      border-radius: 2rem;
      background: var(--card-bg);
      backdrop-filter: blur(8px); /* Glass effect to see flowers behind */
      box-shadow: 0 10px 30px rgba(157, 141, 241, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.5);
      text-align: center;
    }

    h1 {
      margin: 0 0 0.2rem;
      font-size: 2.5rem; /* Slightly smaller */
      font-weight: normal;
    }

    .subtitle {
      margin-bottom: 1.5rem; /* Tighter spacing */
      color: var(--text-muted);
      font-size: 1.2rem;
      font-style: italic;
    }

    .timer {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px; /* Tighter grid */
    }

    @media (max-width: 500px) {
      .timer { grid-template-columns: repeat(3, 1fr); } /* Keep 3 columns on mobile too */
      .value { font-size: 1.6rem !important; }
      .label { font-size: 0.7rem !important; }
    }

    .segment {
      background: rgba(250, 249, 255, 0.6);
      padding: 0.8rem 0.2rem;
      border-radius: 1rem;
      border: 1px solid rgba(240, 237, 255, 0.5);
    }

    .value {
      display: block;
      font-size: 1.9rem; /* More compact numbers */
      font-weight: bold;
      color: var(--accent-purple);
      line-height: 1;
      margin-bottom: 2px;
    }

    .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
    }

    .footer {
      margin-top: 1.5rem;
      font-size: 1rem;
      color: var(--text-muted);
      opacity: 0.8;
    }
  </style>
</head>
<body>

<div class="flower" style="left: 5%; animation-delay: 0s;">❀</div>
  <div class="flower" style="left: 15%; animation-delay: 7s;">❀</div>
  <div class="flower" style="left: 25%; animation-delay: 3s;">❀</div>
  <div class="flower" style="left: 40%; animation-delay: 10s;">❀</div>
  <div class="flower" style="left: 55%; animation-delay: 1s;">❀</div>
  <div class="flower" style="left: 70%; animation-delay: 5s;">❀</div>
  <div class="flower" style="left: 85%; animation-delay: 8s;">❀</div>
  <div class="flower" style="left: 95%; animation-delay: 2s;">❀</div>

  <main class="card">
    <h1>Luke & Hayes</h1>
    <p class="subtitle">how long we've been together</p>

    <div class="timer">
      <div class="segment">
        <span class="value" id="years">0</span>
        <span class="label">Years</span>
      </div>
      <div class="segment">
        <span class="value" id="months">0</span>
        <span class="label">Months</span>
      </div>
      <div class="segment">
        <span class="value" id="days">0</span>
        <span class="label">Days</span>
      </div>
      <div class="segment">
        <span class="value" id="hours">00</span>
        <span class="label">Hours</span>
      </div>
      <div class="segment">
        <span class="value" id="minutes">00</span>
        <span class="label">Mins</span>
      </div>
      <div class="segment">
        <span class="value" id="seconds">00</span>
        <span class="label">Secs</span>
      </div>
    </div>

    <p class="footer">Forever & Always</p>
  </main>

  <script>
    function updateTimer() {
      const startDate = new Date(2025, 9, 17, 0, 0, 0);
      const now = new Date();

      let years = now.getFullYear() - startDate.getFullYear();
      let months = now.getMonth() - startDate.getMonth();
      let days = now.getDate() - startDate.getDate();

      if (days < 0) {
        months--;
        const prevMonth = new Date(now.getFullYear(), now.getMonth(), 0);
        days += prevMonth.getDate();
      }

      if (months < 0) {
        years--;
        months += 12;
      }

      document.getElementById('years').innerHTML = years;
      document.getElementById('months').innerHTML = months;
      document.getElementById('days').innerHTML = days;
      document.getElementById('hours').innerHTML = String(now.getHours()).padStart(2, '0');
      document.getElementById('minutes').innerHTML = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('seconds').innerHTML = String(now.getSeconds()).padStart(2, '0');
    }

    updateTimer();
    setInterval(updateTimer, 1000);
  </script>
</body>
</html>
