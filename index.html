<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luke & Hayes</title>
  <style>
    :root {
      /* Lavender Theme Palette */
      --bg-color: #f3efff;
      --card-bg: rgba(255, 255, 255, 0.7);
      --accent-purple: #9d8df1;
      --text-main: #4a3f6b;
      --text-muted: #7c73a3;
      --glass-border: rgba(157, 141, 241, 0.2);
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 2rem;
      background: var(--bg-color);
      font-family: Inter, system-ui, -apple-system, sans-serif;
      color: var(--text-main);
      overflow: hidden; /* Keeps flowers contained */
    }

    /* Simple Animated Flowers */
    .flower {
      position: fixed;
      color: white;
      font-size: 1.5rem;
      user-select: none;
      pointer-events: none;
      z-index: -1;
      opacity: 0.6;
      animation: drift 15s linear infinite;
    }

    @keyframes drift {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    .card {
      max-width: 720px;
      width: 100%;
      padding: 2.25rem;
      border-radius: 2rem;
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 50px rgba(157, 141, 241, 0.15);
      border: 2px solid var(--glass-border);
      position: relative;
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: clamp(2.25rem, 4vw, 3.5rem);
      letter-spacing: -0.04em;
      color: var(--text-main);
    }

    p {
      margin: 0 0 1.5rem;
      color: var(--text-muted);
      line-height: 1.75;
      font-size: 1.05rem;
    }

    .timer {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .segment {
      background: white;
      border: 1px solid var(--glass-border);
      border-radius: 1.2rem;
      padding: 1.2rem;
      box-shadow: 0 4px 12px rgba(157, 141, 241, 0.05);
    }

    .value {
      font-size: 2.25rem;
      font-weight: 700;
      margin: 0;
      color: var(--accent-purple);
      letter-spacing: -0.04em;
    }

    .label {
      margin: 0.5rem 0 0;
      color: var(--text-muted);
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      font-weight: 600;
    }

    .footer {
      margin-top: 2rem;
      color: var(--text-muted);
      font-size: 0.95rem
