<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luke & Hayes</title>
  <style>
    :root {
      --bg-color: #f3efff;
      --card-bg: rgba(255, 255, 255, 0.85); /* Increased transparency */
      --accent-purple: #9d8df1;
      --text-main: #4a3f6b;
      --text-muted: #7c73a3;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-color);
      font-family: "Times New Roman", Times, serif;
      color: var(--text-main);
      overflow: hidden;
    }

    /* Floating flower decorations */
    .flower {
      position: absolute;
      bottom: -10%;
      color: white;
      font-size: 2rem;
      user-select: none;
      z-index: 1;
      animation: drift 12s linear infinite;
      text-shadow: 0 0 10px rgba(157, 141, 241, 0.3);
    }

    @keyframes drift {
      from { transform: translateY(0) rotate(0deg); opacity: 0.8; }
      to { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
    }

    .card {
      position: relative;
      z-index: 10;
      max-width: 500px; /* Narrower for more background space */
      width: 80%;
      padding: 2rem 1.5rem; /* More compact padding */
      border-radius: 2rem;
      background: var(--card-bg);
      backdrop-filter: blur(8px); /* Glass effect to see flowers behind */
      box-shadow: 0 10px 30px rgba(157, 141, 241, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.5);
      text-align: center;
    }

    h1 {
      margin: 0 0 0.2rem;
      font-size: 2.5rem; /* Slightly smaller */
      font-weight: normal;
    }

    .subtitle {
      margin-bottom: 1.5rem; /* Tighter spacing */
      color: var(--text-muted);
      font-size: 1.2rem;
      font-style: italic;
    }

    .timer {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px; /* Tighter grid */
    }

    @media (max-width: 500px) {
      .timer { grid-template-columns: repeat(3, 1fr); } /* Keep 3 columns on mobile too */
      .value { font-size: 1.6rem !important; }
      .label { font-size: 0.7rem !important; }
    }
