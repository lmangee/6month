<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luke & Hayes</title>
  <style>
    :root {
      --bg-color: #f3efff;
      --card-bg: #ffffff;
      --accent-purple: #9d8df1;
      --text-main: #4a3f6b;
      --text-muted: #7c73a3;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-color);
      /* Font changed to Times New Roman */
      font-family: "Times New Roman", Times, serif;
      color: var(--text-main);
      overflow: hidden;
    }

    /* Floating flowers */
    .flower {
      position: absolute;
      bottom: -10%;
      color: white;
      font-size: 2rem;
      user-select: none;
      z-index: 1;
      animation: drift 12s linear infinite;
    }

    @keyframes drift {
      from { transform: translateY(0) rotate(0deg); opacity: 0.8; }
      to { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
    }

    .card {
      position: relative;
      z-index: 10;
      max-width: 600px;
      width: 85%;
      padding: 2.5rem;
      border-radius: 2rem;
      background: var(--card-bg);
      box-shadow: 0 15px 35px rgba(157, 141, 241, 0.2);
      border: 1px solid rgba(157, 141, 241, 0.1);
      text-align: center;
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: 3rem;
      font-weight: normal;
    }

    .subtitle {
      margin-bottom: 2rem;
      color: var(--text-muted);
      font-size: 1.4rem;
      font-style: italic;
    }

    .timer {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
    }

    @media (max-width: 480px) {
      .timer { grid-template-columns: repeat(2, 1fr); }
    }

    .segment {
      background: #faf9ff;
      padding: 1rem;
      border-radius: 1rem;
      border: 1px solid #f0edff;
    }

    .value {
      display: block;
      font-size: 2.2rem;
      font-weight: bold;
      color: var(--accent-purple);
    }

    .label {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
    }

    .footer {
      margin-top: 2rem;
      font-size: 1.1rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <div class="flower" style="left: 15%; animation-delay: 0s;">❀</div>
  <div class="flower" style="left: 45%; animation-delay: 3s;">❀</div>
  <div class="flower" style="left: 75%; animation-delay: 6s;">❀</div>

  <main class="card">
    <h1>Luke & Hayes</h1>
    <p class="subtitle">how long we've been together</p>

    <div class="timer">
      <div class="segment">
        <span class="value" id="years">0</span>
        <span class="label">Years</span>
      </div>
      <div class="segment">
        <span class="value" id="months">0</span>
        <span class="label">Months</span>
      </div>
      <div class="segment">
        <span class="value" id="days">0</span>
        <span class="label">Days</span>
      </div>
      <div class="segment">
        <span class="value" id="hours">00</span>
        <span class="label">Hours</span>
      </div>
      <div class="segment">
        <span class="value" id="minutes">00</span>
        <span class="label">Mins</span>
      </div>
      <div class="segment">
        <span class="value" id="seconds">00</span>
        <span class="label">Secs</span>
      </div>
    </div>

    <p class="footer">Forever & Always</p>
  </main>
