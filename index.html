<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luke & Hayes</title>
  <style>
    :root {
      --bg-color: #f3efff;
      --card-bg: rgba(255, 255, 255, 0.9);
      --accent-purple: #9d8df1;
      --text-main: #4a3f6b;
      --text-muted: #7c73a3;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: var(--bg-color);
      font-family: 'Inter', sans-serif;
      color: var(--text-main);
      overflow-x: hidden;
    }

    /* Flowers floating in the background */
    .flower {
      position: fixed;
      bottom: -50px;
      color: white;
      font-size: 2rem;
      user-select: none;
      z-index: 1; /* Behind the card */
      animation: drift 10s linear infinite;
    }

    @keyframes drift {
      from { transform: translateY(0) rotate(0deg); opacity: 1; }
      to { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
    }

    .card {
      position: relative;
      z-index: 10; /* Forces the card to the very front */
      max-width: 650px;
      width: 90%;
      padding: 3rem 2rem;
      border-radius: 2rem;
      background: var(--card-bg);
      box-shadow: 0 20px 40px rgba(157, 141, 241, 0.2);
      border: 1px solid white;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2.5rem;
      color: var(--text-main);
    }

    .timer {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 15px;
      margin-top: 25px;
    }

    .segment {
      background: #ffffff;
      padding: 15px;
      border-radius: 1rem;
      border: 1px solid #eee;
    }

    .value {
      display: block;
      font-size: 2rem;
      font-weight: bold;
      color: var(--accent-purple);
    }

    .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
    }

    .footer {
      margin-top: 30px;
      font-size: 0.9rem;
      color: var(--text-muted);
      font-style: italic;
    }
  </style>
</head>
<body>

  <div class="flower" style="left: 10%; animation-delay: 0s;">❀</div>
  <div class="flower" style="left: 30%; animation-delay: 4s;">❀</div>
  <div class="flower" style="left: 70%; animation-delay: 2s;">❀</div>
  <div class="flower" style="left: 90%; animation-delay: 6s;">❀</div>

  <main class="card">
    <h1>Luke & Hayes</h1>
    <p>Since October 17, 2025</p>

    <div class="timer">
      <div class="segment">
        <span class="value" id="years">0</span>
        <span class="label">Years</span>
      </div>
      <div class="segment">
        <span class="value" id="months">0</span>
        <span class="label">Months</span>
      </div>
      <div class="segment">
        <span class="value" id="days">0</span>
        <span class="label">Days</span>
      </div>
      <div class="segment">
        <span class="value" id="hours">00</span>
        <span class="label">Hours</span>
      </div>
      <div class="segment">
        <span class="value" id="minutes">00</span>
        <span class="label">Mins</span>
      </div>
      <div class="segment">
        <span class="value" id="seconds">00</span>
        <span class="label">Secs</span>
      </div>
    </div>

    <p class="footer">Forever & Always</p>
  </main>
